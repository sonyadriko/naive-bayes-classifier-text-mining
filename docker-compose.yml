# Docker Compose configuration for Naive Bayes Classifier API

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: naive_bayes_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-naive_bayes}
      MYSQL_USER: ${DB_USER:-nb_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-nb_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - naive_bayes_network

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: naive_bayes_api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      # Database
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-nb_user}
      DB_PASSWORD: ${DB_PASSWORD:-nb_password}
      DB_NAME: ${DB_NAME:-naive_bayes}

      # Security
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}

      # Application
      APP_NAME: ${APP_NAME:-Naive Bayes Classifier API}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: ${DEBUG:-False}
      ENVIRONMENT: ${ENVIRONMENT:-production}

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000","http://localhost:5173"]}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - naive_bayes_network

  # Adminer (Database Management UI) - Optional
  adminer:
    image: adminer:latest
    container_name: naive_bayes_adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: pepa-linha
    depends_on:
      - mysql
    networks:
      - naive_bayes_network
    profiles:
      - tools

volumes:
  mysql_data:
    driver: local

networks:
  naive_bayes_network:
    driver: bridge
