# Docker Compose configuration for development

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: naive_bayes_api_dev
    volumes:
      - .:/app
    environment:
      DEBUG: "True"
      ENVIRONMENT: development
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
